name: backend-ci

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        env:
          GEMINI_API_KEY: "dummy"
          APP_FEATURES_DEV_DEBUG_ENDPOINTS: "false"
          APP_FEATURES_DEV_IMAGE_ENDPOINT: "false"
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: mvn -q test