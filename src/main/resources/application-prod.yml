#src/main/resources/application-prod.yml
server:
  port: 8080
  address: 0.0.0.0

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 20MB
      file-size-threshold: 2MB
  task:
    scheduling:
      pool:
        size: 6
      thread-name-prefix: "sched-"
      shutdown:
        await-termination: true
        await-termination-period: 30s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/calai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: none             # 無自動建表；請用 Flyway/Liquibase
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      client-type: lettuce

  mail:
    host: smtp.gmail.com
    port: 587
    test-connection: true
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    properties:
      mail.transport.protocol: smtp
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true   # 建議加上
      mail.smtp.connectiontimeout: 5000   # (ms) 避免連線卡死
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000
    default-encoding: UTF-8

  # ✅ prod 不要用 devtools restart（就算依賴還在也先關）
  devtools:
    restart:
      enabled: false
    add-properties: false



management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  entitlement:
    expiry-worker:
      fixed-delay: PT10M
  ai:
    quota:
      cooldown:
        step-minutes: 10   # cooldownStepMinutes
        max-minutes: 30    # maxCooldownMinutes
      trial:
        premium-limit: 15  # trialPremiumLimit
        total-limit: 30    # trialTotalLimit
      paid:
        premium-limit: 300 # paidPremiumLimit
        total-limit: 800  # paidTotalLimit
    abuse-guard:
      enabled: true
      window: 60m
      hourOpsThreshold: 50
      minCacheHitRate: 0.10
      deviceSwitchThreshold: 3
      cooldown: 30m
      forceLow: 30m
      keyTtl: 2h
    modelTiers:
      MODEL_TIER_HIGH:
        VISION:
          provider: GEMINI
          modelId: "gemini-3.1-flash-lite-preview"
        TEXT:
          provider: GEMINI
          modelId: "gemini-3.1-flash-lite-preview"
      MODEL_TIER_LOW:
        VISION:
          provider: GEMINI
          modelId: "gemini-2.5-flash-lite"
        TEXT:
          provider: GEMINI
          modelId: "gemini-2.5-flash-lite"
  guard:
    rate:
      free-per-minute: 6
      paid-per-minute: 20
      redis-prefix: "bitecal-prod"
    inflight:
      max: 2
      redis-prefix: "bitecal-prod"
      lease-ttl: "PT5M"
  actuator:
    user: "${APP_ACTUATOR_USER:actuator}"
    pass: "${APP_ACTUATOR_PASS:change-me}"
  foodlog:
    provider: "GEMINI"
  provider:
    gemini:
      enabled: true
      base-url: "https://generativelanguage.googleapis.com"
      api-key: "${GEMINI_API_KEY}"
      connect-timeout: 5s
      read-timeout: 30s
      label-use-function-calling: false
      photo-album:
        max-output-tokens: 1536
        temperature: 0.0
      label-json:
        max-output-tokens: 2048
        temperature: 0.0
  features:
    dev-image-endpoint: false    # Prod must be false
    dev-debug-endpoints: false   # Prod must be false
  google:
    play:
      enabled: true
      package-name: "com.calai.bitecal"
      service-account-json-path: "${GOOGLE_PLAY_BITE_CAL_SA_JSON_PATH:}"  # dev 可用
    web-client-id: "${GOOGLE_WEB_CLIENT_ID_DEV:575775859979-nuhb6lmchca4sn5719193uke61eda7pq.apps.googleusercontent.com}"
  billing:
    products:
      monthly: [ "bitecal_monthly" ]
      yearly: [ "bitecal_yearly" ]
  openfoodfacts:
    redis-prefix: "bitecal-prod"
    base-url: "https://world.openfoodfacts.org"
    connect-timeout: "PT5S"
    read-timeout: "PT12S"
    user-agent: "BitCal_AI/1.0 (contact: dev@bitcalai.example)"
    global-read-limit-per-min: 90   # 建議 < 100，留 buffer（OFF 100 req/min）
    lock-ttl: "PT30S"
    circuit-ttl: "PT5M" # 429/403 時熔斷 5 分鐘（你可改 3m/10m）
    cache:
      positive-ttl: "P30D"          # found: 7–30天（你可調）
      negative-ttl: "PT12H"         # not found: 6–24小時（你可調）
      purge-delay: "PT1H"
    name-search:



  auth:
    access-ttl-sec: 900
    refresh-ttl-sec: 2592000
  email:
    enabled: true
    otp-length: 4
    ttl-minutes: 10
    sender: "st9360606@gmail.com"

  storage:
    weight-photos-dir: uploads/weight-photos
    local:
      base-dir: ./data # TODO 要排程刪除
      tmp-cleaner:
        enabled: true
        tmp-subdir: "blobs/tmp"   # 相對於每個 user-* 目錄，例如 ./data/user-1/blobs/tmp
        keep: "PT6H"              # 檔案超過 6 小時才刪；空資料夾可提前刪
        fixed-delay: "PT6H"        # 每 6 小時跑一次
        initial-delay: "PT1M"     # 啟動後 1 分鐘跑第一次
        max-depth: 8
        delete-empty-dirs: true
      sha256-orphan-cleaner:
        enabled: true               # ✅ 先開著，但搭配 dry-run
        dry-run: true               # ✅ 先觀察 log，確認安全後改 false
        sha256-subdir: "blobs/sha256"
        min-age: "PT1H"             # 檔案至少 1 小時以上才檢查（保守）
        fixed-delay: "PT6H"         # 每 6 小時跑一次
        initial-delay: "PT5M"       # 啟動後 5 分鐘跑第一次
        max-delete-per-run: 100     # 單次最多刪 100 個
        max-depth: 8
        delete-empty-dirs: false    # sha256 通常是平面檔案目錄，先關閉即可

  retention:
    foodlog:
      enabled: true
      keep-original-image: "PT72H"           # 一般原始圖片 3 天
      keep-saved-original-image: "PT360H"    # SAVED 原始圖片 15 天
      keep-pending: "PT48H"                  # PENDING 2 天
      keep-failed: "PT168H"                  # FAILED 7 天
      keep-draft: "PT360H"                   # DRAFT 15 天
      keep-deleted-tombstone: "PT240H"       # DELETED tombstone 10 天 一筆資料一旦被 retention 轉成 DELETED 它的 tombstone 只再留 10 天
      batch-size: 200
      keep-daily-summary-days: 36            #Progress 統計圖留存36天

  account-deletion:
    worker:
      enabled: true
      claim-limit: 5
      per-table-delete-limit: 500
      food-batch: 200
      check-interval: "PT30S"
      base-retry-delay: "PT10S"

  internal:
    api-token: ${INTERNAL_API_TOKEN}   #powershell -NoProfile -Command "[Convert]::ToBase64String((1..48 | ForEach-Object { Get-Random -Maximum 256 }))"

referral:
  email-outbox:
    fixed-delay: PT1M
    batch-size: 20
    max-retries: 5

alias:
  promotion:
    fixedDelay: "PT72H"
    initialDelay: "PT5M"
    windowDays: 30
    minUsers: 3
    minCount: 7
    minMedian: 0.88

  events:
    purge:
      enabled: true
      cron: "0 10 4 * * *"      # 每天 04:10 清一次（可調）
      retentionDays: 45         # 留存 45 天（promotion 只看 45 天）
      batchSize: 50000          # 依你資料量調整（1~10萬都可）
      maxTotalPerRun: 1000000   # 新增：單次 run 總上限
      pauseMsBetweenBatches: 50 # 新增：批次間暫停，降低鎖壓力

logging:
  level:
    org.springframework.scheduling: INFO
    com.calai.backend.workout.job: INFO
    com.calai.backend.foodlog.task: INFO

workout:
  estimate:
    blacklistPolicy: block   # 可選：generic（現狀）、block（阻擋）、audit（只記錄與回傳 not_found）

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
