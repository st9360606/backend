#src/main/resources/application-dev.yml
server:
  port: 8080
  address: 0.0.0.0

spring:
  task:
    scheduling:
      pool:
        size: 6                 # 由 2 提升到 6：promotion/purge/retention 等可並行
      thread-name-prefix: "sched-"
      shutdown:
        await-termination: true
        await-termination-period: 30s
    # 若你偏好全局設定時區（依 Boot 版本），也可加上（仍建議註解端顯式 zone 保險）
    # time-zone: Asia/Taipei
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/calai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: none             # 無自動建表；請用 Flyway/Liquibase
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC         # 與 DB 溝通用 UTC
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      client-type: lettuce

  mail:
    host: smtp.gmail.com
    port: 587
    test-connection: true
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    properties:
      mail.transport.protocol: smtp
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true   # 建議加上
      mail.smtp.connectiontimeout: 5000   # (ms) 避免連線卡死
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000
    default-encoding: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health,info,scheduledtasks
  endpoint:
    health:
      show-details: when_authorized

app:
  ai:
    quota:
      cooldown:
        step-minutes: 10   # cooldownStepMinutes
        max-minutes: 30    # maxCooldownMinutes
      trial:
        premium-limit: 15  # trialPremiumLimit
        total-limit: 30    # trialTotalLimit
      paid:
        premium-limit: 600 # paidPremiumLimit
        total-limit: 1000  # paidTotalLimit
    abuse-guard:
      enabled: true
      window: 60m
      hourOpsThreshold: 50
      minCacheHitRate: 0.10
      deviceSwitchThreshold: 3
      cooldown: 30m
      forceLow: 30m
      keyTtl: 2h
    modelTiers:
      MODEL_TIER_HIGH:
        VISION:
          provider: GEMINI
          modelId: "gemini-3-flash-preview"   # ✅ 修正：不是 gemini-3-flash
        TEXT:
          provider: GEMINI
          modelId: "gemini-3-flash-preview"
      MODEL_TIER_LOW:
        VISION:
          provider: GEMINI
          modelId: "gemini-2.5-flash-lite"    # ✅ 穩定可用
        TEXT:
          provider: GEMINI
          modelId: "gemini-2.5-flash-lite"
  guard:
    rate:
      free-per-minute: 6
      paid-per-minute: 20
  actuator:
    user: "${APP_ACTUATOR_USER:actuator}"
    pass: "${APP_ACTUATOR_PASS:change-me}"
  foodlog:
    provider: "GEMINI"  # STUB / TODO 正式環境改 : GEMINI
  provider:
    gemini:
      enabled: true
      base-url: "https://generativelanguage.googleapis.com"
      api-key: "${GEMINI_API_KEY}"
      connect-timeout: 5s
      read-timeout: 30s
      max-output-tokens: 1024
      temperature: 0.1
  features:
    dev-image-endpoint: true
    dev-debug-endpoints: true
  google:
    play:
      enabled: true
      package-name: "com.calai.bitecal"
      service-account-json-path: "${GOOGLE_PLAY_BITE_CAL_SA_JSON_PATH:}"  # dev 可用
    web-client-id: "${GOOGLE_WEB_CLIENT_ID_DEV:575775859979-nuhb6lmchca4sn5719193uke61eda7pq.apps.googleusercontent.com}"
  billing:
    products:
      monthly: [ "bitecal_monthly" ]
      yearly: [ "bitecal_yearly" ]
  openfoodfacts:
    redis-prefix: "bitecal-dev"     # ✅ 建議每個環境不同
    base-url: "https://world.openfoodfacts.org"
    basic-auth-user: ""
    basic-auth-pass: ""
    connect-timeout: "PT5S"
    read-timeout: "PT12S"
    user-agent: "BitCal_AI/1.0 (contact: dev@bitcalai.example)"
    global-read-limit-per-min: 90   # 建議 < 100，留 buffer（OFF 100 req/min）
    lock-ttl: "PT30S"
    circuit-ttl: "PT5M" # 429/403 時熔斷 5 分鐘（你可改 3m/10m）
    cache:
      positive-ttl: "P30D"          # found: 7–30天（你可調）
      negative-ttl: "PT12H"         # not found: 6–24小時（你可調）
      purge-delay: "PT1H"
  auth:
    access-ttl-sec: 900
    refresh-ttl-sec: 2592000
  security:
    allow-origins: "*"
  email:
    enabled: true
    otp-length: 4
    ttl-minutes: 10
    # 若使用 Gmail SMTP，from 最好等於 username；否則容易被覆寫或遭拒收
    sender: "st9360606@gmail.com"
    # 若要用自家網域 no-reply@bitecal.app，建議改用 SendGrid/SES 並設定 SPF/DKIM/DMARC
  storage:
    weight-photos-dir: uploads/weight-photos
    local:
      base-dir: ./data # TODO 要排程刪除
      tmp-cleaner:
        enabled: true
        tmp-subdir: "blobs/tmp"   # 相對於每個 user-* 目錄，例如 ./data/user-1/blobs/tmp
        keep: "PT6H"              # 檔案超過 6 小時才刪；空資料夾可提前刪
        fixed-delay: "PT6H"        # 每 6 小時跑一次
        initial-delay: "PT1M"     # 啟動後 1 分鐘跑第一次
        max-depth: 8
        delete-empty-dirs: true
      sha256-orphan-cleaner:
        enabled: true               # ✅ 先開著，但搭配 dry-run
        dry-run: true               # ✅ 先觀察 log，確認安全後改 false
        sha256-subdir: "blobs/sha256"
        min-age: "PT1H"             # 檔案至少 1 小時以上才檢查（保守）
        fixed-delay: "PT6H"         # 每 6 小時跑一次
        initial-delay: "PT5M"       # 啟動後 5 分鐘跑第一次
        max-delete-per-run: 100     # 單次最多刪 100 個
        max-depth: 8
        delete-empty-dirs: false    # sha256 通常是平面檔案目錄，先關閉即可

  retention:
    foodlog:
      enabled: true           #FoodLogRetentionWorker
      keep-draft: "PT72H"     # 3 天
      keep-saved: "PT768H"    # 32 天
      batch-size: 200
      purge-after: "PT168H"   # 可選：DELETED 後 7 天再做 hard purge（下一步）

  account-deletion:
    worker:
      enabled: true
      claim-limit: 5
      per-table-delete-limit: 500
      food-batch: 200
      check-interval: "PT30S"
      base-retry-delay: "PT10S"

alias:
  promotion:
    # 不再用 cron（避免 */3 的曆法語意），改 72h 固定延遲
    fixedDelay: "PT72H"
    initialDelay: "PT5M"
    windowDays: 30
    minUsers: 3
    minCount: 7
    minMedian: 0.88

  events:
    purge:
      enabled: true
      cron: "0 10 4 * * *"      # 每天 04:10 清一次（可調）
      retentionDays: 45         # 留存 45 天（promotion 只看 45 天）
      batchSize: 50000          # 依你資料量調整（1~10萬都可）
      maxTotalPerRun: 1000000   # 新增：單次 run 總上限
      pauseMsBetweenBatches: 50 # 新增：批次間暫停，降低鎖壓力

logging:
  level:
    org.springframework.scheduling: INFO
    com.calai.backend.workout.job: INFO
    com.calai.backend.foodlog.task: INFO

workout:
  estimate:
    blacklistPolicy: block   # 可選：generic（現狀）、block（阻擋）、audit（只記錄與回傳 not_found）

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


